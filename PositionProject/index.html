<!DOCTYPE html>
<html lang="en">
<head>

    <title>Position Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

       <img src="headphone.jpg" alt="Headphones">

       </div>

       <div id="offer">

       </div>
