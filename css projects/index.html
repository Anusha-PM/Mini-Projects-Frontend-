<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form action="\action">
<hr>
<header>
    <h1>Student Registration</h1>
</header>
<main>
    <section>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" class="input" placeholder="Enter your name">
    </section>
    <br>
    <section>
        <label for="name">Email:</label>
        <input type="email" id="email" name="email" class="input" placeholder="Enter your email">
    </section>
    <br>
    <section>
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" class="input" placeholder="Enter your password">
    </section>
    <br>
    <section>
        <h3>Gender:</h3>
       <input type="radio" id="radio" name="radio" >
       <label for="radio">Male</label>
        <br>
         <input type="radio" id="fem" name="radio" >
         <label for="fem">Female</label>
        
    </section>
    <br>
    <section>
        <h3>Skills:</h3>
        
        <input type="checkbox" id="html">
        <label for="html">HTML</label>
        <br>
         <input type="checkbox" id="html">
        <label for="html">CSS</label>
        <br>
         <input type="checkbox" id="html">
        <label for="html">JavaScript</label>
    </section>
    <br>

    <section>
        <h3>Department</h3>
        <br>
        <select name="Department" id="department" class="input">
            <option value="selection">Select Department</option>
            <option value="ISE">ISE</option>
            <option value="CSE">CSE</option>
            <option value="ai">AIML</option>
        </select>
    </section>
    <br>

    <hr>
    <br>
    
    <button type="button">Register Button</button>
    <br>
    <br>
    <hr>
    <section>
        <h3>Programming Languages</h3>
        <br>
        <ol>
            <li>HTML</li>
            <li>CSS</li>
            <li>JavaScript</li>
            <li>React</li>
            <li>Node.js</li>
            <li>MongoDB</li>
        </ol>
    </section>


</main>
</form>
</body>
</html>
