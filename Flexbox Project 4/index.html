<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Pricing Plans</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="main">
        <div>
            <h1>Choose Your Plan</h1>
        </div>
        <div id="card-container">
        <div class="card">
            <h2>BASIC</h2>
            <p>Rs199</p>
            <ul>
                <li>5 Projects</li>
                <li>1 GB Storage</li>
                <li>Email Support</li>
            </ul>
            <button>Subscribe</button>
            
        </div>
         
        
        <div class="card">
            <h2>PR0</h2>
            <p>Rs499</p>
            <ul>
                <li>20 Projects</li>
                <li>10 GB Storage</li>
                <li>Priority Support</li>
            </ul>
            <button>Subscribe</button>
            
        </div >
        <div class="card">
            <h2>PREMIUM</h2>
            <p>Rs999</p>
             <ul>
                <li>Unlimited Projects</li>
                <li>100 GB Storage</li>
                <li>24/7 Support</li>
            </ul>
            <button>Subscribe</button>
            
        </div>
        </div>
    </div>
</body>
</html>
