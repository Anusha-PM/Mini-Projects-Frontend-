<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="container">

        <!-- HEADER -->
        <header>
            <h1>Admin Dashboard</h1>

            <ul id="hnav">
                <li><a href="#">Dashboard</a></li>
                <li><a href="#">Users</a></li>
                <li><a href="#">Settings</a></li>
            </ul>
        </header>


        
        <aside>
            <ul>
                <li>
                    <a class="active" href="#">🏠 Dashboard</a>
                </li>

                <li>
                    <a href="#">👩‍🎓 Users</a>
                </li>

                <li>
                    <a href="#">📊 Analytics</a>
                </li>

                <li>
                    <a href="#">⚙️ Settings</a>
                </li>
            </ul>
        </aside>


    
        <main>

            <h2>Overview</h2>

            <div id="card-container">

                <div class="card">

                <div class="card">

                </div>

                <div class="card">
                    <h3>Revenue</h3>
                    <p>₹1,23,344</p>
                    <button>View Details</button>
                </div>

                <div class="card">

                </div>

            </div>

        <footer>
